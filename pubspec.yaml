name: masapp
description: "Maintenance Super App - Enterprise Desktop Maintenance Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^15.1.2

  # Database - Shared Offline SQLite (FFI for Desktop)
  sqflite_common_ffi: ^2.3.4+1
  sqlite3_flutter_libs: ^0.5.25


  # UI Components
  fl_chart: ^0.70.2
  data_table_2: ^2.5.14
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2
  syncfusion_flutter_datagrid: ^29.1.39
  
  # Desktop Window Management
  window_manager: ^0.4.3
  
  # File Management & Documents
  file_picker: ^8.1.7
  printing: ^5.14.2
  pdf: ^3.11.3
  open_filex: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  crypto: ^3.0.6
  shared_preferences: ^2.3.4
  collection: ^1.19.1
  equatable: ^2.0.7
  logger: ^2.5.0

  # QR Code Generation
  qr_flutter: ^4.1.0

  # Image Handling
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Network info (for audit trail)
  network_info_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - db/schema_sqlite.sql
    - db/seed_sqlite.sql
